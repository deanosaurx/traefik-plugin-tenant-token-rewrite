displayName: Tenant Token Rewrite
type: middleware
import: github.com/deanosaurx/traefik-plugin-tenant-token-rewrite
summary: Rewrite /openid-connect/token to Keycloak realm path based on tenant host.
testData:
  domainSuffix: example.com
  sourcePath: /openid-connect/token
  targetTemplate: /auth/realms/{tenant}/protocol/openid-connect/token
